<!DOCTYPE html>
<html>
<head>
    <title>FreshMart Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial;
        }

        /* LOGIN */
     /* LOGIN PAGE BACKGROUND */
.login {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;

    /* Background image */
    background: url("https://images.unsplash.com/photo-1604719312566-8912e9227c6a") no-repeat center center/cover;
}

/* SMALL LOGIN BOX */
.login-box {
    width: 260px;              /* 👈 smaller size */
    padding: 20px;
    border-radius: 12px;

    /* Glass effect */
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(8px);

    text-align: center;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

/* INPUT FIELDS */
.login-box input {
    width: 100%;
    padding: 8px;
    margin: 8px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
}

/* BUTTON */
.login-box button {
    width: 100%;
    padding: 8px;
    background: #27ae60;   /* green (FreshMart theme) */
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.login-box button:hover {
    background: #219150;
}

/* TITLE */
.login-box h2 {
    margin-bottom: 10px;
    color: #2c3e50;
}

        /* DASHBOARD */
        .dashboard {
            display: none;
            background: #dcd0f0;
            min-height: 100vh;
        }

        .header {
            background: #2c3e50;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
        }

        .container {
    width: 900px;          /* 👈 controls overall size */
    margin: auto;          /* 👈 center */
    padding: 20px;
}

.cards {
    display: flex;
    gap: 15px;
}

.card {
    padding: 15px;
}

.big {
    font-size: 28px;       /* 👈 smaller numbers */
}

.charts {
    display: flex;
    gap: 15px;
    margin-top: 20px;
}

canvas {
    width: 100% !important;
    height: 250px !important;   /* 👈 smaller charts */
}

        #error {
            color: red;
        }

        button.logout {
            background: red;
            color: white;
            border: none;
            padding: 8px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<!-- LOGIN PAGE -->
<div class="login" id="loginPage">
    <div class="login-box">
        <h2>FreshMart Login</h2>

        <input type="text" id="user" placeholder="User ID">
        <input type="password" id="pass" placeholder="Password">

        <button onclick="login()">Login</button>
        <p id="error"></p>
    </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboardPage">

    <div class="header">
        <h2>FreshMart Analytics</h2>
        <button class="logout" onclick="logout()">Logout</button>
    </div>

    <div class="container">

        <!-- KPI CARDS -->
        <div class="cards">
            <div class="card">
                <h3>Total Sales</h3>
                <div class="big">12935176</div>
            </div>

            <div class="card">
                <h3>Profit</h3>
                <div class="big">2317189</div>
            </div>

            <div class="card">
                <h3>Days Out of Stock</h3>
                <div class="big">64</div>
            </div>
        </div>

        <!-- CHARTS -->
        <div class="charts">
            <canvas id="barChart"></canvas>
            <canvas id="pieChart"></canvas>
        </div>

    </div>

</div>

<script>
    function login() {
        let u = document.getElementById("user").value;
        let p = document.getElementById("pass").value;

        if (u === "admin" && p === "1234") {
            document.getElementById("loginPage").style.display = "none";
            document.getElementById("dashboardPage").style.display = "block";
            loadCharts();
        } else {
            document.getElementById("error").innerText = "Invalid Login!";
        }
    }

    function logout() {
        location.reload();
    }

    function loadCharts() {
        new Chart(document.getElementById("barChart"), {
            type: 'bar',
            data: {
                labels: ["Total Sales"],
                datasets: [{
                    label: "Sales",
                    data: [12935176]
                }]
            }
        });

        new Chart(document.getElementById("pieChart"), {
            type: 'pie',
            data: {
                labels: ["Groceries", "Bakery", "Dairy", "Snacks"],
                datasets: [{
                    data: [2321486, 1223530, 2002649, 1278384]
                }]
            }
        });
    }
</script>

</body>
</html>
